    <style>
        :root {
            --primary-bg: #fffcfd;
            --viber-color: #7360f2;
            --tg-color: #229ED9;
            --accent-pink: #ff8fa3;
            --text-main: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(255, 143, 163, 0.2);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .description {
            font-size: 15px;
            color: #777;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .main-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            border: none;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .main-btn:active { transform: scale(0.96); }

        .viber-btn { background: var(--viber-color); }
        .tg-btn { background: var(--tg-color); }

        .btn-icon {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .popup {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 40px 25px;
            transition: bottom 0.4s cubic-bezier(0.17, 0.67, 0.29, 1.01);
            z-index: 101;
            text-align: center;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }

        .popup.active { bottom: 0; }
        .overlay.active { display: block; opacity: 1; }

        .popup h2 {
            font-size: 20px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .price-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 2px solid #f2f2f2;
            border-radius: 15px;
            background: white;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .price-btn:active {
            background: var(--primary-bg);
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }

        .close-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 14px;
            color: #aaa;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    
    <img src="images/111.jpg" alt="Logo" class="profile-img">
    
    <h1>AJO_Flowers</h1>
    <p class="description">Букети які не в'януть! ✨<br>Для замовлення пишіть у месенджери:</p>

    <div class="main-buttons">
    <button class="main-btn viber-btn" onclick="openPopup('viber')">
        <svg class="btn-icon viber-icon" viewBox="0 0 448 512">
            <path d="M444 49.9C431.3 38.2 379.9 .9 265.3 .4c0 0-135.1-8.1-200.9 52.3C27.8 89.3 14.9 143 13.5 209.5c-1.4 66.5-3.1 191.1 117 224.9h.1l-.1 51.6s-.8 20.9 13 25.1c16.6 5.2 26.4-10.7 42.3-27.8 8.7-9.4 20.4-22.8 35-38.7 20.2 5.8 46.1 8.5 68.2 7.2 313.4-19.9 354.1-170.8 355-212.7 .9-41.6-4.2-156.7-100-189.2zM336 324.3c-23.2 16.3-58.7 31-100.6 38.4-15.3 2.7-32.3 3.1-45.9 3.2-31.4 .1-70.6-2.6-86.7-6.2-14.9-3.4-30-10.5-38.6-14.7-4.6-2.2-7.1-5.6-7.5-9.6-.4-4.1 1.6-8.2 5.3-11 15.4-11.7 35.8-27.1 53.6-40.4 7.2-5.4 15.6-8.1 23.9-8.1 11.8 0 22.7 5.7 29.8 14.9 9.9 12.8 19.3 25.6 28 36.9 19.1-13.6 34.6-26.6 44.9-35.8 23.6-20.9 44.5-45 59.8-71.1 4.5-7.7 8.5-15 12-22.2 4.7-9.5 12.4-16.1 21.6-18.7 9.2-2.6 18.9-1.2 27.2 3.8 12.5 7.6 26.3 16 39.5 24.1 10.7 6.6 17 17.5 17.5 30.1 .6 12.5-4.5 24.8-13.8 33.7-19.6 18.7-43 36.6-67 52.8z"/>
        </svg>
        <span>Написати у Viber</span>
    </button>

    <button class="main-btn tg-btn" onclick="openPopup('tg')">
        <svg class="btn-icon" viewBox="0 0 496 512">
            <path d="M248 8C111 8 0 119 0 256s111 248 248 248 248-111 248-248S385 8 248 8zm121.8 169.9l-40.7 191.8c-3 13.6-11.1 16.9-22.4 10.5l-62-45.7-29.9 28.8c-3.3 3.3-6.1 6.1-12.5 6.1l4.4-63.1 114.9-103.8c5-4.4-1.1-6.9-7.7-2.5l-142 89.4-61.2-19.1c-13.3-4.2-13.6-13.3 2.8-19.7l239.1-92.2c11.1-4 20.8 2.7 17.2 19.5z"/>
        </svg>
        <span>Написати у Telegram</span>
    </button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>
<div class="popup" id="popup">
    <h2>На який бюджет розраховуєте?</h2>
    <button class="price-btn" onclick="sendLead('1000')">До 1000 грн</button>
    <button class="price-btn" onclick="sendLead('2000')">До 2000 грн</button>
    <button class="price-btn" onclick="sendLead('5000')">До 5000 грн</button>
    <a href="#" class="close-link" onclick="closePopup()">Скасувати</a>
</div>

<script>
    // ==========================================
    // 3. НАСТРОЙКИ ВАШИХ МЕССЕНДЖЕРОВ
    // ==========================================
    const SETTINGS = {
        
        // ---> ВАШ НИК В ТЕЛЕГРАМЕ (БЕЗ ЗНАКА @) <---
        tg_user: 'JuliaUrbanska', 
        
        // ---> ВАШ НОМЕР ДЛЯ VIBER (БЕЗ ПЛЮСА, ТОЛЬКО ЦИФРЫ) <---
        viber_num: '380938582462', 
        
        // ---> ЕСЛИ БУДЕШЬ ДЕЛАТЬ БОТА В VIBER, ВПИШИ ЕГО ИМЯ СЮДА (ИНАЧЕ ОСТАВЬ ПУСТЫМ '') <---
        viber_bot: '' 
    };

    let selectedMessenger = '';
    let isProcessing = false; // Флаг блокировки мультиклика
    const popup = document.getElementById('popup');
    const overlay = document.getElementById('overlay');

    function openPopup(messenger) {
        selectedMessenger = messenger;
        overlay.classList.add('active');
        setTimeout(() => popup.classList.add('active'), 10);
    }

    function closePopup() {
        popup.classList.remove('active');
        setTimeout(() => overlay.classList.remove('active'), 300);
    }

    function sendLead(price) {
        if (isProcessing) return; // Если флаг активен, прерываем функцию
        isProcessing = true; // Включаем блокировку

        // Пиксель отправляет событие ClickButton в TikTok
        ttq.track('ClickButton', {
            content_name: 'Выбор бюджета',
            value: price,
            currency: 'UAH'
        });

        let finalUrl = '';
        const msg = encodeURIComponent(`Доброго дня! Цікавлять букети до ${price} грн`);

        if (selectedMessenger === 'tg') {
            finalUrl = `https://t.me/${SETTINGS.tg_user}?text=${msg}`;
        } else {
            if(SETTINGS.viber_bot) {
                finalUrl = `viber://pa?chatURI=${SETTINGS.viber_bot}&context=${price}`;
            } else {
                finalUrl = `viber://chat?number=%2B${SETTINGS.viber_num}`;
            }
        }

        setTimeout(() => {
            window.location.href = finalUrl;
        }, 300);

        // Снимаем блокировку через 3 секунды (3000 мс)
        setTimeout(() => {
            isProcessing = false;
        }, 3000);
    }
</script>

</body>
</html>
